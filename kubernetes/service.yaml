apiVersion: v1
kind: Service
metadata:
  name: {{ tool }}-service
  namespace: {{ namespace | default('automotive-tools') }}
  labels:
    app: {{ tool }}
spec:
  type: ClusterIP
  selector:
    app: {{ tool }}
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: debug
    port: 2000
    targetPort: 2000
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
