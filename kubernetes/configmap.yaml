apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ tool }}-config
  namespace: {{ namespace | default('automotive-tools') }}
  labels:
    app: {{ tool }}
data:
  config.yaml: |
    tool: {{ tool }}
    version: {{ version }}
    environment: {{ environment | default('production') }}
    
    logging:
      level: INFO
      format: json
    
    server:
      host: 0.0.0.0
      port: 8080
      workers: 4
    
    features:
      debug_mode: false
      telemetry: true
      auto_update: false
