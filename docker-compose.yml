version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: automotive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  registry:
    image: registry:2
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"

  api:
    build:
      dockerfile: containers/api.dockerfile
      context: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/automotive"
      REGISTRY_URL: "http://registry:5000"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    depends_on:
      postgres:
        condition: service_healthy
      registry:
        condition: service_started
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    command: uvicorn agent.api:app --host 0.0.0.0 --port 8080 --reload

  orchestrator:
    build:
      dockerfile: containers/orchestrator.dockerfile
      context: .
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/automotive"
      REGISTRY_URL: "http://registry:5000"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  registry_data:
